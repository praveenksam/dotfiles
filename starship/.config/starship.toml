"$schema" = 'https://starship.rs/config-schema.json'

format = """
[](gold)\
$os\
$username\
[](bg:gold fg:love)\
$directory\
[](bg:rose fg:pine)\
$git_branch\
$git_status\
[](fg:rose bg:foam)\
$c\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
[](fg:foam bg:pine)\
$conda\
[](fg:pine bg:iris)\
$time\
[ ](fg:iris)\
$cmd_duration\
$line_break\
$character"""

palette = 'rose_pine_dawn'

[os]
disabled = false
style = "bg:gold fg:base"

[os.symbols]
Windows            = ""
Ubuntu             = "󰕈"
SUSE               = ""
Raspbian           = "󰐿"
Mint               = "󰣭"
Macos              = "󰀵"
Manjaro            = ""
Linux              = "󰌽"
Gentoo             = "󰣨"
Fedora             = "󰣛"
Alpine             = ""
Amazon             = ""
Android            = ""
AOSC               = ""
Arch               = "󰣇"
Artix              = "󰣇"
CentOS             = ""
Debian             = "󰣚"
Redhat             = "󱄛"
RedHatEnterprise   = "󱄛"

[username]
show_always = true
style_user  = "bg:gold fg:base"
style_root  = "bg:love fg:base"
format      = '[ $user]($style)'

[directory]
style               = "bg:rose fg:base"
format              = "[ $path ]($style)"
truncation_length   = 3
truncation_symbol   = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music"     = "󰝚 "
"Pictures"  = " "
"Developer" = "󰲋 "

[git_branch]
symbol = ""
style  = "bg:rose"
format = '[[ $symbol $branch ](fg:base bg:rose)]($style)'

[git_status]
style  = "bg:rose"
format = '[[($all_status$ahead_behind )](fg:base bg:rose)]($style)'

[nodejs]
symbol = ""
style  = "bg:foam"
format = '[[ $symbol( $version) ](fg:base bg:foam)]($style)'

[c]
symbol = " "
style  = "bg:foam"
format = '[[ $symbol( $version) ](fg:base bg:foam)]($style)'

[rust]
symbol = ""
style  = "bg:foam"
format = '[[ $symbol( $version) ](fg:base bg:foam)]($style)'

[golang]
symbol = ""
style  = "bg:foam"
format = '[[ $symbol( $version) ](fg:base bg:foam)]($style)'

[php]
symbol = ""
style  = "bg:foam"
format = '[[ $symbol( $version) ](fg:base bg:foam)]($style)'

[java]
symbol = " "
style  = "bg:foam"
format = '[[ $symbol( $version) ](fg:base bg:foam)]($style)'

[kotlin]
symbol = ""
style  = "bg:foam"
format = '[[ $symbol( $version) ](fg:base bg:foam)]($style)'

[haskell]
symbol = ""
style  = "bg:foam"
format = '[[ $symbol( $version) ](fg:base bg:foam)]($style)'

[python]
symbol = ""
style  = "bg:foam"
format = '[[ $symbol( $version)(\(#$virtualenv\)) ](fg:base bg:foam)]($style)'

[docker_context]
symbol = ""
style  = "bg:pine"
format = '[[ $symbol( $context) ](fg:base bg:pine)]($style)'

[conda]
symbol      = "  "
style       = "fg:base bg:pine"
format      = '[$symbol$environment ]($style)'
ignore_base = false

[time]
disabled     = false
time_format  = "%R"
style        = "bg:iris"
format       = '[[  $time ](fg:base bg:iris)]($style)'

[line_break]
disabled = true

[character]
disabled                   = false
success_symbol             = '[❯](bold fg:foam)'
error_symbol               = '[❯](bold fg:love)'
vimcmd_symbol              = '[❮](bold fg:foam)'
vimcmd_replace_one_symbol  = '[❮](bold fg:iris)'
vimcmd_replace_symbol      = '[❮](bold fg:iris)'
vimcmd_visual_symbol       = '[❮](bold fg:gold)'

[cmd_duration]
show_milliseconds   = true
format              = " in $duration "
style               = "bg:iris"
disabled            = false
show_notifications  = true
min_time_to_notify  = 45000

